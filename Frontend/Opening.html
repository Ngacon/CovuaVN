<div id="openings" class="page">
    <h2>Khai cuộc</h2>

    <!-- Form tạo bài đăng -->
    <div class="post-form">
        <h3>Tạo bài đăng mới</h3>
        <input type="text" id="postTitle" placeholder="Tiêu đề" />
        <textarea id="postContent" placeholder="Nội dung"></textarea>
        <button onclick="addPost()">Đăng</button>
    </div>

    <!-- Nơi hiển thị các bài đăng -->
    <div id="postsContainer">
        <!-- Bài đăng sẽ hiển thị ở đây -->
    </div>
</div>
